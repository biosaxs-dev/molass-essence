name: Deploy Jupyter Book

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install mystmd jupyter nbformat
      
      - name: Validate notebooks have outputs
        run: |
          python3 << 'EOF'
          import sys, json, pathlib
          failed = []
          for nb_path in pathlib.Path('chapters').rglob('*.ipynb'):
              try:
                  data = json.loads(nb_path.read_text(encoding='utf-8'))
                  code_cells = [c for c in data['cells'] if c['cell_type'] == 'code']
                  if code_cells and not any(c.get('outputs') for c in code_cells):
                      failed.append(str(nb_path))
              except Exception as e:
                  print(f"Error reading {nb_path}: {e}")
          
          if failed:
              print("\n❌ ERROR: Notebooks without outputs (run ./execute_notebooks.ps1 locally):")
              for f in failed:
                  print(f"  - {f}")
              sys.exit(1)
          else:
              print("✅ All notebooks have outputs")
          EOF
      
      - name: Initialize MyST (download templates)
        run: |
          myst init --yes || true
          
      - name: Build book
        env:
          BASE_URL: /molass-essence
        run: myst build --html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_build/html'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
